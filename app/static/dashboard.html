<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HomeLab Sonar — Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;500;600;700&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
    <link rel="icon" id="faviconEl" href="/static/logo.png">
    <style>
        :root, [data-theme="dark"] {
            --bg: #0d0d0f; --bg2: #111115; --surface: #18181d; --surface2: #1f1f26;
            --border: #2c2c38; --text: #e0e0e8; --text-muted: #8888a8; --text-dim: #55555f;
            --accent: #22d3ee; --accent-glow: rgba(34,211,238,0.14); --accent-strong: rgba(34,211,238,0.3);
            --accent2: #f59e0b;
            --active: #34d399; --active-bg: rgba(52,211,153,0.09);
            --danger: #f43f5e; --danger-bg: rgba(244,63,94,0.1);
        }
        [data-theme="light"] {
            --bg: #f4ede0; --bg2: #ece4d4; --surface: #fdf8f0; --surface2: #f5ede0;
            --border: #c8b89a; --text: #1a2a38; --text-muted: #7a6a54; --text-dim: #b0a088;
            --accent: #1e3d6b; --accent-glow: rgba(30,61,107,0.14); --accent-strong: rgba(30,61,107,0.28);
            --accent2: #b84010;
            --active: #1a6b45; --active-bg: rgba(26,107,69,0.1);
            --danger: #be1d3c; --danger-bg: rgba(190,29,60,0.1);
        }
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        @keyframes fade-up { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
        @keyframes slide-down { from { opacity:0; transform:translateY(-16px); } to { opacity:1; transform:translateY(0); } }
        @keyframes tile-in { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
        @keyframes spin { to { transform:rotate(360deg); } }
        @keyframes status-pulse { 0%,100% { opacity:1; } 50% { opacity:0.45; } }
        @keyframes w-sweep { 0% { top:-2px; } 100% { top:100%; } }
        html { scroll-behavior:smooth; }
        body { background:var(--bg); color:var(--text); font-family:'Chakra Petch',sans-serif; min-height:100vh; overflow-x:hidden; transition:background 0.4s,color 0.4s; }
        body::before {
            content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
            background: radial-gradient(ellipse 70% 55% at 0% 0%, rgba(34,211,238,0.07) 0%, transparent 65%),
                        radial-gradient(ellipse 55% 45% at 100% 100%, rgba(167,139,250,0.07) 0%, transparent 65%),
                        radial-gradient(ellipse 40% 35% at 75% 10%, rgba(245,158,11,0.04) 0%, transparent 60%);
        }
        [data-theme="light"] body::before {
            background: radial-gradient(ellipse 70% 55% at 0% 0%, rgba(30,61,107,0.06) 0%, transparent 65%),
                        radial-gradient(ellipse 50% 40% at 100% 100%, rgba(184,64,16,0.05) 0%, transparent 65%);
        }
        .wrap { padding:28px 28px 0; position:relative; z-index:1; }
        .s1 { animation:fade-up 0.55s ease 0.00s both; }
        .s2 { animation:fade-up 0.55s ease 0.07s both; }
        .s3 { animation:fade-up 0.55s ease 0.14s both; }

        /* ── HEADER ── */
        header { display:flex; align-items:center; justify-content:space-between; padding-bottom:18px; position:relative; }
        header::after { content:''; position:absolute; bottom:0; left:0; right:0; height:1px; background:linear-gradient(to right,transparent,var(--accent) 30%,var(--accent) 70%,transparent); opacity:0.5; }
        .logo { display:flex; align-items:center; gap:14px; }
        .logo-text-block { line-height:1; }
        .logo-name { font-size:1.4rem; font-weight:700; letter-spacing:0.18em; text-transform:uppercase; color:var(--text); }
        .logo-name em { font-style:normal; color:var(--accent); transition:color 0.4s; }
        .logo-sub { font-size:0.58rem; letter-spacing:0.35em; text-transform:uppercase; color:var(--text-muted); margin-top:4px; }
        .header-btns { display:flex; align-items:center; gap:8px; }
        .hdr-icon-btn { width:36px; height:36px; background:none; border:none; border-radius:8px; cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--text-muted); transition:color 0.2s,background 0.2s; }
        .hdr-icon-btn svg { width:18px; height:18px; transition:transform 0.3s; }
        .hdr-icon-btn:hover { color:var(--accent); background:var(--surface2); }
        .hdr-icon-btn:hover svg { transform:rotate(30deg); }
        .hdr-icon-btn.active { color:var(--accent); background:var(--accent-glow); }
        .upd-dot { position:absolute; top:5px; right:5px; width:7px; height:7px; border-radius:50%; background:#f59e0b; border:2px solid var(--bg); pointer-events:none; display:none; }
        .upd-dot.show { display:block; }

        /* ── PAGE NAV ── */
        .page-nav { display:flex; gap:0; margin-top:0; }
        .nav-link { padding:10px 20px; color:var(--text-muted); text-decoration:none; font-size:0.72rem; font-weight:600; letter-spacing:0.12em; text-transform:uppercase; position:relative; transition:color 0.2s; }
        .nav-link:hover { color:var(--text); }
        .nav-link.active { color:var(--accent); }
        .nav-link.active::after { content:''; position:absolute; bottom:-1px; left:12px; right:12px; height:2px; background:var(--accent); border-radius:2px 2px 0 0; }

        /* ── NOTIFICATIONS ── */
        #statusContainer { position:fixed; bottom:24px; right:24px; z-index:3000; display:flex; flex-direction:column; align-items:flex-end; gap:8px; }
        .notif { padding:11px 16px; border-radius:8px; font-size:0.75rem; font-weight:600; letter-spacing:0.06em; border:1px solid; animation:slide-down 0.3s ease; }
        .notif-err { background:var(--danger-bg); color:var(--danger); border-color:var(--danger); }

        /* ── DASHBOARD ── */
        .dash-section { margin-top:28px; padding-bottom:8px; }
        .dash-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(280px, 360px)); gap:10px; justify-content:center; }

        /* ── CATEGORY GROUP ── */
        .dash-group { margin-bottom:24px; }
        .dash-group:last-child { margin-bottom:0; }
        .dash-cat-hd {
            font-size:0.58rem; font-weight:600; letter-spacing:0.28em; text-transform:uppercase;
            color:var(--text-muted); margin-bottom:10px;
            display:flex; align-items:center; gap:10px;
            cursor:pointer; user-select:none;
        }
        .dash-cat-hd::after { content:''; flex:1; height:1px; background:var(--border); opacity:0.5; }
        .dash-cat-hd:hover { color:var(--text); }
        .dash-cat-hd:hover .cat-chevron { color:var(--accent); }
        .cat-chevron { display:inline-flex; align-items:center; color:var(--text-dim); transition:transform 0.25s ease, color 0.2s; }
        .dash-group.cat-collapsed .cat-chevron { transform:rotate(-90deg); }
        .dash-group.cat-collapsed { margin-bottom:14px; }
        .dash-group.cat-collapsed .dash-cat-hd::after { display:none; }
        .dash-grid { transition:height 0.28s ease; }

        /* ── APP TILE (horizontal, mafl-style) ── */
        .app-tile {
            background:var(--surface);
            border:1px solid var(--border);
            border-radius:10px;
            padding:12px 52px 12px 14px;
            display:flex;
            align-items:center;
            gap:12px;
            cursor:pointer;
            text-decoration:none;
            color:var(--text);
            position:relative;
            overflow:hidden;
            transition:border-color 0.2s, box-shadow 0.2s, transform 0.2s, background 0.2s;
        }
        .app-tile::before {
            content:''; position:absolute; inset:0; border-radius:10px; opacity:0; transition:opacity 0.2s;
            background:radial-gradient(ellipse 120% 100% at 0% 50%, var(--accent-glow) 0%, transparent 70%);
        }
        .app-tile:hover { border-color:var(--accent); transform:translateY(-2px); box-shadow:0 6px 24px rgba(0,0,0,0.3), 0 0 0 1px var(--accent-strong); }
        .app-tile:hover::before { opacity:1; }
        .app-tile:active { transform:translateY(0); }

        /* ── ICON ── */
        .tile-icon-wrap {
            width:44px; height:44px; border-radius:10px;
            background:var(--surface2); border:1px solid var(--border);
            display:flex; align-items:center; justify-content:center;
            overflow:hidden; flex-shrink:0; position:relative;
            transition:border-color 0.2s, box-shadow 0.2s;
        }
        .app-tile:hover .tile-icon-wrap { border-color:var(--accent-strong); box-shadow:0 0 14px var(--accent-glow); }
        .tile-icon-wrap img { width:28px; height:28px; object-fit:contain; border-radius:3px; }
        .tile-initials {
            width:28px; height:28px; border-radius:6px;
            display:flex; align-items:center; justify-content:center;
            font-size:0.8rem; font-weight:700; color:#fff;
        }

        /* ── TILE BODY ── */
        .tile-body { flex:1; min-width:0; display:flex; flex-direction:column; gap:2px; position:relative; z-index:1; }
        .tile-name { font-size:0.82rem; font-weight:600; letter-spacing:0.03em; color:var(--text); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; line-height:1.3; }
        .tile-desc { font-size:0.65rem; color:var(--text-muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; line-height:1.4; letter-spacing:0.02em; }
        .tile-tags { display:flex; flex-wrap:wrap; gap:4px; margin-top:5px; }
        .tile-tag {
            display:inline-block; padding:2px 7px; border-radius:3px;
            font-size:0.56rem; font-weight:700; letter-spacing:0.1em; text-transform:uppercase;
            border:1px solid currentColor; white-space:nowrap; line-height:1.5;
        }

        .tile-anim { animation:tile-in 0.35s ease both; }

        /* ── STATUS BADGE ── */
        .tile-status {
            position:absolute; top:8px; right:10px;
            display:inline-flex; align-items:center;
            padding:1px 5px; border-radius:3px;
            font-size:0.5rem; font-weight:700; letter-spacing:0.08em; text-transform:uppercase;
            border:1px solid currentColor; white-space:nowrap; line-height:1.5;
        }
        .tile-status-checking { color:var(--text-dim); border-color:var(--border); background:transparent; }
        .tile-status-online   { color:var(--active); border-color:var(--active); background:var(--active-bg); animation:status-pulse 2.5s ease-in-out infinite; }
        .tile-status-offline  { color:var(--danger); border-color:var(--danger); background:var(--danger-bg); }

        /* ── WIDGETS ── */
        .widget-zone { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:10px; margin-top:24px; }
        .widget-card {
            background: linear-gradient(145deg, var(--surface) 0%, var(--w-bg, var(--surface)) 100%);
            border:1px solid var(--w-border, var(--border));
            border-radius:10px; padding:16px 18px;
            position:relative; overflow:hidden;
            animation:tile-in 0.35s ease both;
        }
        /* grid pattern — fades to invisible at centre, full opacity at edges */
        .widget-card::before {
            content:''; position:absolute; inset:0; pointer-events:none; z-index:0;
            background-image:
                linear-gradient(var(--w-grid) 1px, transparent 1px),
                linear-gradient(90deg, var(--w-grid) 1px, transparent 1px);
            background-size: 28px 28px;
            -webkit-mask-image: radial-gradient(ellipse 85% 85% at 50% 50%, transparent 25%, black 100%);
            mask-image:         radial-gradient(ellipse 85% 85% at 50% 50%, transparent 25%, black 100%);
        }
        /* sweep line */
        .widget-card::after {
            content:''; position:absolute; left:0; right:0; height:1px; z-index:0;
            background: linear-gradient(to right, transparent, var(--w-line) 35%, var(--w-line) 65%, transparent);
            animation: w-sweep 8s linear infinite;
            pointer-events:none;
        }

        #widgetClock   { --w-bg: rgba(34,211,238,0.12); --w-border: rgba(34,211,238,0.38); --w-grid: rgba(34,211,238,0.22); --w-line: rgba(34,211,238,0.32); }
        #widgetNetwork { --w-bg: rgba(52,211,153,0.11); --w-border: rgba(52,211,153,0.34); --w-grid: rgba(52,211,153,0.20); --w-line: rgba(52,211,153,0.30); }
        #widgetProxmox { --w-bg: rgba(245,158,11,0.10); --w-border: rgba(245,158,11,0.34); --w-grid: rgba(245,158,11,0.18); --w-line: rgba(245,158,11,0.28); }

        #widgetClock::after   { animation-delay:  0s; }
        #widgetNetwork::after { animation-delay: -3s; }
        #widgetProxmox::after { animation-delay: -6s; }

        [data-theme="light"] #widgetClock   { --w-bg: rgba(30,61,107,0.10); --w-border: rgba(30,61,107,0.36); --w-grid: rgba(30,61,107,0.18); --w-line: rgba(30,61,107,0.26); }
        [data-theme="light"] #widgetNetwork { --w-bg: rgba(26,107,69,0.09); --w-border: rgba(26,107,69,0.32); --w-grid: rgba(26,107,69,0.16); --w-line: rgba(26,107,69,0.24); }
        [data-theme="light"] #widgetProxmox { --w-bg: rgba(184,64,16,0.08); --w-border: rgba(184,64,16,0.30); --w-grid: rgba(184,64,16,0.15); --w-line: rgba(184,64,16,0.22); }
        .widget-hd { display:flex; align-items:center; justify-content:space-between; font-size:0.58rem; font-weight:600; letter-spacing:0.22em; text-transform:uppercase; color:var(--text-muted); margin-bottom:14px; position:relative; z-index:1; }
        .widget-pulse { width:7px; height:7px; border-radius:50%; background:var(--active); display:inline-block; animation:status-pulse 2.5s ease-in-out infinite; margin-right:5px; }

        /* clock */
        .clock-row1 { display:flex; justify-content:space-between; font-size:0.6rem; letter-spacing:0.14em; text-transform:uppercase; color:var(--text-muted); margin-bottom:8px; font-family:'Chakra Petch',sans-serif; position:relative; z-index:1; }
        .clock-time { font-family:'Courier Prime',monospace; font-size:2.2rem; font-weight:700; letter-spacing:0.06em; text-align:center; position:relative; z-index:1; }
        .clock-time .colon { color:var(--accent); }
        .clock-time::before { content:''; position:absolute; inset:-10px; border-radius:14px; background:radial-gradient(ellipse 80% 60% at 50% 60%, var(--accent-glow) 0%, transparent 70%); pointer-events:none; }
        .clock-divider { height:1px; background:var(--border); opacity:0.5; margin:10px 0 8px; position:relative; z-index:1; }
        .clock-tz { font-size:0.6rem; letter-spacing:0.18em; text-transform:uppercase; color:var(--text-muted); text-align:center; position:relative; z-index:1; }

        /* network */
        .net-stats { display:flex; justify-content:space-around; margin-bottom:12px; position:relative; z-index:1; }
        .net-stat { text-align:center; }
        .net-stat-val { font-size:1.5rem; font-weight:700; font-family:'Courier Prime',monospace; line-height:1; }
        .net-stat-lbl { font-size:0.52rem; letter-spacing:0.16em; text-transform:uppercase; color:var(--text-muted); margin-top:3px; }
        .net-bar-wrap { height:4px; background:var(--border); border-radius:2px; overflow:hidden; position:relative; z-index:1; }
        .net-bar-fill { height:100%; background:var(--active); border-radius:2px; transition:width 0.6s ease; }

        /* proxmox */
        .pve-node { margin-bottom:12px; position:relative; z-index:1; }
        .pve-node:last-child { margin-bottom:0; }
        .pve-node-name { font-size:0.6rem; letter-spacing:0.14em; text-transform:uppercase; color:var(--text-muted); margin-bottom:6px; }
        .pve-bars { display:flex; gap:8px; margin-bottom:4px; }
        .pve-bar-group { flex:1; }
        .pve-bar-lbl { font-size:0.5rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--text-dim); margin-bottom:3px; display:flex; justify-content:space-between; }
        .pve-bar-track { height:5px; background:var(--border); border-radius:3px; overflow:hidden; }
        .pve-bar-fill { height:100%; border-radius:3px; transition:width 0.6s ease; }
        .pve-meta { font-size:0.58rem; color:var(--text-muted); }

        /* quick links */
        .link-zone { margin-top:20px; }
        .link-group { margin-bottom:18px; }
        .link-group:last-child { margin-bottom:0; }
        .link-group.cat-collapsed { margin-bottom:14px; }
        .link-group.cat-collapsed .cat-chevron { transform:rotate(-90deg); }
        .link-group.cat-collapsed .dash-cat-hd::after { display:none; }
        .link-strip { display:flex; flex-wrap:wrap; justify-content:center; gap:6px 10px; margin-top:8px; transition:height 0.28s ease, margin-top 0.28s ease; }
        .link-pill {
            display:inline-flex; align-items:center; gap:5px;
            padding:4px 10px; border-radius:6px;
            background:var(--surface); border:1px solid var(--border);
            color:var(--text-muted); text-decoration:none;
            font-size:0.68rem; font-weight:500; letter-spacing:0.04em;
            transition:color 0.15s, border-color 0.15s, background 0.15s;
        }
        .link-pill:hover { color:var(--text); border-color:var(--accent); background:var(--accent-glow); }
        .link-favicon { width:14px; height:14px; border-radius:2px; object-fit:contain; }
        .link-favicon-dot { width:8px; height:8px; border-radius:50%; background:var(--accent); flex-shrink:0; }
        .link-ext { font-size:0.55rem; color:var(--text-dim); }
        .link-pill:hover .link-ext { color:var(--accent); }

        /* ── EMPTY STATE ── */
        .empty-state { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:80px 24px; gap:16px; }
        .empty-icon { color:var(--text-muted); opacity:0.65; }
        .empty-title { font-size:0.88rem; font-weight:600; letter-spacing:0.16em; text-transform:uppercase; color:var(--text-muted); }
        .empty-sub { font-size:0.75rem; color:var(--text-muted); text-align:center; line-height:1.6; max-width:280px; }
        .empty-btn { display:inline-flex; align-items:center; gap:7px; padding:10px 20px; border-radius:8px; border:1px solid var(--accent); background:var(--accent-glow); color:var(--accent); font-family:'Chakra Petch',sans-serif; font-size:0.72rem; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; text-decoration:none; cursor:pointer; transition:all 0.2s; }
        .empty-btn:hover { background:var(--accent); color:var(--bg); transform:translateY(-1px); }

        /* ── LOADING ── */
        .loader { display:flex; align-items:center; justify-content:center; padding:80px; }
        .loader svg { animation:spin 1s linear infinite; color:var(--text-dim); }

        /* ── FOOTER ── */
        footer { margin-top:48px; padding:20px 0 28px; position:relative; text-align:center; font-size:0.62rem; color:var(--text-muted); letter-spacing:0.22em; text-transform:uppercase; }
        footer::before { content:''; position:absolute; top:0; left:0; right:0; height:1px; background:linear-gradient(to right,transparent,var(--accent) 30%,var(--accent) 70%,transparent); opacity:0.5; }
        footer a { color:var(--accent); text-decoration:none; }
        footer a:hover { text-decoration:underline; }

        @media (max-width:600px) {
            .wrap { padding:16px 16px 0; }
            header { flex-direction:column; align-items:flex-start; gap:12px; }
            .header-btns { align-self:flex-end; }
            .dash-grid { grid-template-columns:1fr; gap:8px; }
            .app-tile { padding:10px 50px 10px 12px; }
        }
    </style>
</head>
<body>
    <div class="wrap">
        <header class="s1">
            <div class="logo">
                <img id="headerLogo" src="/static/logo.png" alt="Logo" style="width:64px;height:64px;object-fit:contain;">
                <div class="logo-text-block">
                    <div class="logo-name">HOME<em>LAB</em> SONAR</div>
                    <div class="logo-sub" id="logoSub" style="display:none;"></div>
                </div>
            </div>
            <div class="header-btns">
                <div style="position:relative;display:inline-flex;">
                    <a href="/settings" class="hdr-icon-btn" id="settingsGearLink" title="Settings">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
                    </a>
                    <span class="upd-dot" id="updateDot" title="Update available — open Settings"></span>
                </div>
                <button class="hdr-icon-btn" onclick="document.getElementById('logoutForm').submit()" title="Log out">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                </button>
                <form id="logoutForm" action="/logout" method="post" style="display:none"></form>
            </div>
        </header>

        <nav class="page-nav s2">
            <a href="/dashboard" class="nav-link active">Dashboard</a>
            <a href="/proxmox/overview" class="nav-link">Proxmox</a>
            <a href="/network/devices" class="nav-link">Network</a>
        </nav>

        <div id="statusContainer"></div>

        <div id="widgetZone" class="widget-zone s3" style="display:none"></div>

        <div class="dash-section s3" id="dashContent">
            <div class="loader">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
            </div>
        </div>

        <div id="linkZone" class="link-zone s3" style="display:none"></div>

        <footer class="s3">
            <p>© 2026 <a href="https://github.com/Mati-l33t/lan-tracker-network-sonar" target="_blank" rel="noopener">Homelab Sonar</a> &nbsp;·&nbsp; <a href="https://github.com/Mati-l33t/lan-tracker-network-sonar/releases" target="_blank" rel="noopener" id="appVersion"></a></p>
        </footer>
    </div>

    <script>
        const API_BASE = window.location.origin;

        (function() {
            var saved = localStorage.getItem('lant-theme');
            if (saved) document.documentElement.setAttribute('data-theme', saved);
        })();

        fetch('/api/subtitle').then(function(r){ return r.json(); }).then(function(d){
            var el = document.getElementById('logoSub');
            if (d.subtitle) { el.textContent = d.subtitle; el.style.display = ''; }
            if (d.logo_url) { document.getElementById('headerLogo').src = d.logo_url; document.getElementById('faviconEl').href = d.logo_url; }
        });

        /* ── AUTO UPDATE CHECK ── */
        (function(){
            var KEY = 'hls-upd', TTL = 6 * 3600 * 1000;
            function showDot() {
                var dot = document.getElementById('updateDot');
                if (dot) dot.classList.add('show');
            }
            var c; try { c = JSON.parse(localStorage.getItem(KEY)); } catch(e) {}
            if (c && (Date.now() - c.ts) < TTL) {
                if (c.available) showDot();
            } else {
                fetch('/api/check-update').then(function(r){ return r.json(); }).then(function(d){
                    try { localStorage.setItem(KEY, JSON.stringify({ts: Date.now(), available: d.update_available, latest: d.latest})); } catch(e) {}
                    if (d.update_available) showDot();
                }).catch(function(){});
            }
        })();

        function esc(s) {
            if (!s) return '';
            return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
        }

        function showError(msg) {
            document.getElementById('statusContainer').innerHTML = '<div class="notif notif-err">' + esc(msg) + '</div>';
            setTimeout(function() { document.getElementById('statusContainer').innerHTML = ''; }, 5000);
        }

        var TILE_COLORS = ['#6366f1','#8b5cf6','#ec4899','#f59e0b','#10b981','#3b82f6','#ef4444','#14b8a6','#f97316','#a855f7'];
        function colorForName(name) {
            var h = 0; for (var i=0;i<name.length;i++) h=(h<<5)-h+name.charCodeAt(i);
            return TILE_COLORS[Math.abs(h)%TILE_COLORS.length];
        }
        function initials(name) {
            var p = name.trim().split(/\s+/);
            return p.length>=2?(p[0][0]+p[1][0]).toUpperCase():name.substring(0,2).toUpperCase();
        }
        function hexToRgba(hex, alpha) {
            if (!hex||hex.length<7) return 'transparent';
            var r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
            return 'rgba('+r+','+g+','+b+','+alpha+')';
        }
        function _applyCatOrder(keys, order) {
            if (!order||!order.length) return keys;
            var sorted=order.filter(function(c){return keys.indexOf(c)!==-1;});
            keys.forEach(function(c){if(sorted.indexOf(c)===-1)sorted.push(c);});
            return sorted;
        }

        function renderTile(app, index) {
            var tile = document.createElement('a');
            tile.className = 'app-tile tile-anim';
            tile.href = app.url || '#';
            tile.target = '_blank';
            tile.rel = 'noopener noreferrer';
            tile.title = app.name;
            tile.style.animationDelay = Math.min(index * 0.04, 0.5) + 's';
            if (!app.url) tile.removeAttribute('href');

            var iconWrap = document.createElement('div');
            iconWrap.className = 'tile-icon-wrap';
            if (app.icon_type === 'selfhst' || app.icon_type === 'custom' || app.icon_type === 'favicon') {
                var img = document.createElement('img');
                img.src = app.icon_value; img.alt = app.name;
                img.onerror = function() {
                    iconWrap.innerHTML = '';
                    var init = document.createElement('div');
                    init.className = 'tile-initials';
                    init.style.background = colorForName(app.name);
                    init.textContent = initials(app.name);
                    iconWrap.appendChild(init);
                };
                iconWrap.appendChild(img);
            } else {
                var init = document.createElement('div');
                init.className = 'tile-initials';
                init.style.background = colorForName(app.name);
                init.textContent = initials(app.name);
                iconWrap.appendChild(init);
            }

            var body = document.createElement('div');
            body.className = 'tile-body';

            var nameEl = document.createElement('div');
            nameEl.className = 'tile-name';
            nameEl.textContent = app.name;
            body.appendChild(nameEl);

            if (app.description) {
                var descEl = document.createElement('div');
                descEl.className = 'tile-desc';
                descEl.textContent = app.description;
                body.appendChild(descEl);
            }

            if (app.tags && app.tags.length) {
                var tagsEl = document.createElement('div');
                tagsEl.className = 'tile-tags';
                app.tags.forEach(function(tag) {
                    var span = document.createElement('span');
                    span.className = 'tile-tag';
                    span.textContent = tag.name;
                    span.style.color = tag.color;
                    span.style.borderColor = tag.color;
                    span.style.background = hexToRgba(tag.color, 0.12);
                    tagsEl.appendChild(span);
                });
                body.appendChild(tagsEl);
            }

            var statusBadge = document.createElement('span');
            statusBadge.className = 'tile-status tile-status-checking';
            statusBadge.dataset.statusId = app.id;
            statusBadge.textContent = '—';

            tile.appendChild(iconWrap);
            tile.appendChild(body);
            tile.appendChild(statusBadge);
            return tile;
        }

        function renderEmptyState() {
            var el = document.createElement('div');
            el.className = 'empty-state';
            el.innerHTML =
                '<svg class="empty-icon" width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>' +
                '<div class="empty-title">No apps yet</div>' +
                '<div class="empty-sub">Add your self-hosted services in Settings to build your dashboard.</div>' +
                '<a href="/settings#dashboard" class="empty-btn">' +
                    '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>' +
                    'Add Applications' +
                '</a>';
            return el;
        }

        async function checkAllStatus(apps) {
            if (!apps.length) return;
            var items = apps.filter(function(a){return a.url;}).map(function(a){return {id:a.id,url:a.url};});
            if (!items.length) return;
            try {
                var res = await fetch(API_BASE + '/api/dashboard/check-status', {
                    method:'POST',
                    headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({items:items})
                });
                var results = await res.json();
                results.forEach(function(r) {
                    var el = document.querySelector('[data-status-id="' + r.id + '"]');
                    if (!el) return;
                    el.className = 'tile-status ' + (r.online ? 'tile-status-online' : 'tile-status-offline');
                    el.textContent = r.online ? 'ONLINE' : 'OFFLINE';
                });
            } catch(e) { /* silent */ }
        }

        /* ── WIDGET: CLOCK ── */
        var _clockInterval = null;
        function renderClockWidget() {
            var zone = document.getElementById('widgetZone');
            var card = document.createElement('div');
            card.className = 'widget-card';
            card.id = 'widgetClock';
            card.innerHTML =
                '<div class="widget-hd"><span>CLOCK</span></div>' +
                '<div class="clock-row1"><span id="wClkDay"></span><span id="wClkDate"></span></div>' +
                '<div class="clock-time" id="wClkTime"></div>' +
                '<div class="clock-divider"></div>' +
                '<div class="clock-tz" id="wClkTz"></div>';
            zone.appendChild(card);
            function tick() {
                var now = new Date();
                var days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
                var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
                document.getElementById('wClkDay').textContent = days[now.getDay()].toUpperCase();
                document.getElementById('wClkDate').textContent =
                    months[now.getMonth()] + ' ' + now.getDate() + ', ' + now.getFullYear();
                var h = String(now.getHours()).padStart(2,'0');
                var m = String(now.getMinutes()).padStart(2,'0');
                var s = String(now.getSeconds()).padStart(2,'0');
                document.getElementById('wClkTime').innerHTML =
                    h + '<span class="colon">:</span>' + m + '<span class="colon">:</span>' + s;
                try {
                    var tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
                    var off = -now.getTimezoneOffset();
                    var sign = off >= 0 ? '+' : '-';
                    var oh = String(Math.floor(Math.abs(off)/60)).padStart(2,'0');
                    var om = String(Math.abs(off)%60).padStart(2,'0');
                    document.getElementById('wClkTz').textContent = tz + ' (UTC' + sign + oh + ':' + om + ')';
                } catch(e) {}
            }
            tick();
            if (_clockInterval) clearInterval(_clockInterval);
            _clockInterval = setInterval(tick, 1000);
        }

        /* ── WIDGET: NETWORK ── */
        var _netInterval = null;
        var _netLastFetch = 0;
        function renderNetworkWidget(data) {
            var zone = document.getElementById('widgetZone');
            var existing = document.getElementById('widgetNetwork');
            var card = existing || document.createElement('div');
            if (!existing) {
                card.className = 'widget-card';
                card.id = 'widgetNetwork';
            }
            var minsAgo = _netLastFetch ? Math.round((Date.now() - _netLastFetch) / 60000) : 0;
            var scanStr = minsAgo === 0 ? 'just now' : minsAgo + 'm ago';
            var pct = data.total > 0 ? Math.round((data.online / data.total) * 100) : 0;
            var newColor = data.new_devices > 0 ? 'var(--accent2)' : 'var(--text-dim)';
            card.innerHTML =
                '<div class="widget-hd"><span>NETWORK</span>' +
                '<span><span class="widget-pulse"></span>LAST SCAN ' + esc(scanStr) + '</span></div>' +
                '<div class="net-stats">' +
                  '<div class="net-stat"><div class="net-stat-val">' + data.total + '</div><div class="net-stat-lbl">TOTAL</div></div>' +
                  '<div class="net-stat"><div class="net-stat-val" style="color:var(--active)">' + data.online + '</div><div class="net-stat-lbl">ONLINE</div></div>' +
                  '<div class="net-stat"><div class="net-stat-val" style="color:var(--danger)">' + data.offline + '</div><div class="net-stat-lbl">OFFLINE</div></div>' +
                  '<div class="net-stat"><div class="net-stat-val" style="color:' + newColor + '">' + data.new_devices + '</div><div class="net-stat-lbl">NEW</div></div>' +
                '</div>' +
                '<div class="net-bar-wrap"><div class="net-bar-fill" style="width:' + pct + '%"></div></div>';
            if (!existing) zone.appendChild(card);
        }
        async function refreshNetworkWidget() {
            try {
                var data = await fetch(API_BASE + '/api/widgets/network').then(function(r){return r.json();});
                _netLastFetch = Date.now();
                renderNetworkWidget(data);
            } catch(e) {}
        }
        function startNetworkWidget() {
            refreshNetworkWidget();
            if (_netInterval) clearInterval(_netInterval);
            _netInterval = setInterval(refreshNetworkWidget, 60000);
        }

        /* ── WIDGET: PROXMOX ── */
        var _pveInterval = null;
        var _pveLastFetch = 0;
        var _pveRefreshSec = 0;
        var _pveRefreshTicker = null;
        function barColor(pct) {
            return pct < 60 ? 'var(--active)' : pct < 85 ? 'var(--accent2)' : 'var(--danger)';
        }
        function fmtUptime(s) {
            var d = Math.floor(s / 86400);
            var h = Math.floor((s % 86400) / 3600);
            return (d > 0 ? d + 'd ' : '') + h + 'h';
        }
        function fmtBytes(b) {
            if (b >= 1073741824) return (b / 1073741824).toFixed(1) + 'G';
            if (b >= 1048576)    return (b / 1048576).toFixed(0) + 'M';
            return b + 'B';
        }
        function renderProxmoxWidget(data) {
            var zone = document.getElementById('widgetZone');
            var existing = document.getElementById('widgetProxmox');
            if (!data.hosts || !data.hosts.length) {
                if (existing) existing.remove();
                return;
            }
            var card = existing || document.createElement('div');
            if (!existing) {
                card.className = 'widget-card';
                card.id = 'widgetProxmox';
            }
            _pveRefreshSec = 0;
            var nodesHtml = '';
            data.hosts.forEach(function(host) {
                host.nodes.forEach(function(node) {
                    var cpuPct = node.cpu_usage;
                    var memPct = node.mem_total > 0 ? Math.round((node.mem_used / node.mem_total) * 100) : 0;
                    nodesHtml +=
                        '<div class="pve-node">' +
                          '<div class="pve-node-name">' + esc(host.name) + ' / ' + esc(node.node) + '</div>' +
                          '<div class="pve-bars">' +
                            '<div class="pve-bar-group">' +
                              '<div class="pve-bar-lbl"><span>CPU</span><span>' + cpuPct + '%</span></div>' +
                              '<div class="pve-bar-track"><div class="pve-bar-fill" style="width:' + cpuPct + '%;background:' + barColor(cpuPct) + '"></div></div>' +
                            '</div>' +
                            '<div class="pve-bar-group">' +
                              '<div class="pve-bar-lbl"><span>RAM</span><span>' + fmtBytes(node.mem_used) + '/' + fmtBytes(node.mem_total) + '</span></div>' +
                              '<div class="pve-bar-track"><div class="pve-bar-fill" style="width:' + memPct + '%;background:' + barColor(memPct) + '"></div></div>' +
                            '</div>' +
                          '</div>' +
                          '<div class="pve-meta">' + node.vms_running + ' running · ' + node.vms_stopped + ' stopped · up ' + fmtUptime(node.uptime) + '</div>' +
                        '</div>';
                });
            });
            card.innerHTML =
                '<div class="widget-hd"><span>PROXMOX</span><span id="pveRefreshLbl">↻ just refreshed</span></div>' +
                nodesHtml;
            if (!existing) zone.appendChild(card);
            if (_pveRefreshTicker) clearInterval(_pveRefreshTicker);
            _pveRefreshTicker = setInterval(function() {
                _pveRefreshSec++;
                var lbl = document.getElementById('pveRefreshLbl');
                if (lbl) lbl.textContent = '↻ ' + _pveRefreshSec + 's ago';
            }, 1000);
        }
        async function refreshProxmoxWidget() {
            try {
                var data = await fetch(API_BASE + '/api/widgets/proxmox').then(function(r){return r.json();});
                _pveLastFetch = Date.now();
                renderProxmoxWidget(data);
            } catch(e) {}
        }
        function startProxmoxWidget() {
            refreshProxmoxWidget();
            if (_pveInterval) clearInterval(_pveInterval);
            _pveInterval = setInterval(refreshProxmoxWidget, 30000);
        }

        /* ── LINK PILL / GROUP HELPERS ── */
        var _chevSvg = '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>';

        function makeLinkPill(lnk) {
            var a = document.createElement('a');
            a.className = 'link-pill';
            a.href = lnk.url || '#';
            a.target = '_blank';
            a.rel = 'noopener noreferrer';
            a.title = lnk.description || lnk.url || '';
            if (lnk.icon_type === 'custom' || lnk.icon_type === 'favicon') {
                var img = document.createElement('img');
                img.className = 'link-favicon'; img.src = lnk.icon_value; img.alt = '';
                img.onerror = function() { this.replaceWith(Object.assign(document.createElement('span'), {className:'link-favicon-dot'})); };
                a.appendChild(img);
            } else if (lnk.url) {
                try {
                    var img = document.createElement('img');
                    img.className = 'link-favicon'; img.src = new URL(lnk.url).origin + '/favicon.ico'; img.alt = '';
                    img.onerror = function() { this.replaceWith(Object.assign(document.createElement('span'), {className:'link-favicon-dot'})); };
                    a.appendChild(img);
                } catch(e) {
                    a.appendChild(Object.assign(document.createElement('span'), {className:'link-favicon-dot'}));
                }
            }
            var nm = document.createElement('span'); nm.textContent = lnk.name; a.appendChild(nm);
            var ext = document.createElement('span'); ext.className = 'link-ext'; ext.textContent = '↗'; a.appendChild(ext);
            return a;
        }

        function makeLinkGroup(cat, items) {
            var grp = document.createElement('div'); grp.className = 'link-group';
            var hd = document.createElement('div'); hd.className = 'dash-cat-hd';
            hd.appendChild(document.createTextNode(cat));
            var chev = document.createElement('span'); chev.className = 'cat-chevron'; chev.innerHTML = _chevSvg;
            hd.appendChild(chev); grp.appendChild(hd);
            var strip = document.createElement('div'); strip.className = 'link-strip';
            items.forEach(function(lnk) { strip.appendChild(makeLinkPill(lnk)); });
            grp.appendChild(strip);
            hd.addEventListener('click', function() { toggleLinkCat(cat, grp); });
            if (_isLinkCatCollapsed(cat)) {
                grp.classList.add('cat-collapsed');
                strip.style.height = '0'; strip.style.overflow = 'hidden'; strip.style.marginTop = '0';
            }
            return grp;
        }

        async function loadDashboard() {
            try {
                var results = await Promise.all([
                    fetch(API_BASE + '/api/widgets/config').then(function(r){return r.json();}),
                    fetch(API_BASE + '/api/dashboard/apps').then(function(r){return r.json();}),
                    fetch(API_BASE + '/api/dashboard/category-order').then(function(r){return r.json();}).catch(function(){return {order:[]};})
                ]);
                var cfg      = results[0];
                var apps     = results[1];
                var catOrder = results[2].order || [];

                /* ── widgets ── */
                var wzone = document.getElementById('widgetZone');
                wzone.innerHTML = '';
                var anyWidget = cfg.clock || cfg.network || cfg.proxmox;
                wzone.style.display = anyWidget ? '' : 'none';
                if (cfg.clock)   renderClockWidget();
                if (cfg.network) startNetworkWidget();
                if (cfg.proxmox) startProxmoxWidget();

                /* ── split apps vs links ── */
                var tileApps = apps.filter(function(a){ return !a.is_link; });
                var links    = apps.filter(function(a){ return  a.is_link; });

                /* ── linkZone retired — everything renders inside dashContent ── */
                var lz = document.getElementById('linkZone');
                lz.innerHTML = ''; lz.style.display = 'none';

                var content = document.getElementById('dashContent');
                content.innerHTML = '';
                if (!tileApps.length && !links.length) { content.appendChild(renderEmptyState()); return; }

                /* ── build category maps ── */
                var tileCats = {}, tileUncategorized = [];
                tileApps.forEach(function(app) {
                    if (app.category) { if (!tileCats[app.category]) tileCats[app.category]=[]; tileCats[app.category].push(app); }
                    else tileUncategorized.push(app);
                });
                var linkCats = {}, linkUncategorized = [];
                links.forEach(function(lnk) {
                    if (lnk.category) { if (!linkCats[lnk.category]) linkCats[lnk.category]=[]; linkCats[lnk.category].push(lnk); }
                    else linkUncategorized.push(lnk);
                });

                /* ── collect all category names and sort together ── */
                var allNames = Object.keys(tileCats);
                Object.keys(linkCats).forEach(function(c){ if (allNames.indexOf(c)===-1) allNames.push(c); });
                var allCatKeys = _applyCatOrder(allNames, catOrder);

                var idx = 0;

                /* ── uncategorized items first ── */
                if (tileUncategorized.length) {
                    var group = document.createElement('div'); group.className = 'dash-group';
                    var grid  = document.createElement('div'); grid.className  = 'dash-grid';
                    tileUncategorized.forEach(function(app){ grid.appendChild(renderTile(app, idx++)); });
                    group.appendChild(grid); content.appendChild(group);
                }
                if (linkUncategorized.length) {
                    content.appendChild(makeLinkGroup('QUICK LINKS', linkUncategorized));
                }

                /* ── categorised groups in sorted order ── */
                allCatKeys.forEach(function(cat) {
                    var catTiles = tileCats[cat] || [];
                    var catLinks = linkCats[cat] || [];

                    if (catTiles.length) {
                        var group = document.createElement('div'); group.className = 'dash-group';
                        var hd = document.createElement('div'); hd.className = 'dash-cat-hd';
                        hd.appendChild(document.createTextNode(cat));
                        var chev = document.createElement('span'); chev.className = 'cat-chevron'; chev.innerHTML = _chevSvg;
                        hd.appendChild(chev); group.appendChild(hd);
                        var grid = document.createElement('div'); grid.className = 'dash-grid';
                        catTiles.forEach(function(app){ grid.appendChild(renderTile(app, idx++)); });
                        group.appendChild(grid);
                        hd.addEventListener('click', function(){ toggleCat(cat, group); });
                        if (_isCatCollapsed(cat)) { group.classList.add('cat-collapsed'); grid.style.height='0'; grid.style.overflow='hidden'; }
                        content.appendChild(group);
                    }

                    if (catLinks.length) {
                        content.appendChild(makeLinkGroup(cat, catLinks));
                    }
                });

                checkAllStatus(tileApps);
                alignCatHeaders();
                requestAnimationFrame(alignLinkHeaders);
            } catch(e) {
                showError('Failed to load dashboard');
            }
        }

        function alignCatHeaders() {
            requestAnimationFrame(function() {
                document.querySelectorAll('.dash-group').forEach(function(group) {
                    if (group.classList.contains('cat-collapsed')) return;
                    var hd = group.querySelector('.dash-cat-hd');
                    var tiles = group.querySelectorAll('.app-tile');
                    if (!hd || !tiles.length) return;
                    var groupLeft = group.getBoundingClientRect().left;
                    var pad = tiles[0].getBoundingClientRect().left - groupLeft;
                    hd.style.paddingLeft = Math.max(0, pad) + 'px';
                    var maxRight = 0;
                    tiles.forEach(function(t) {
                        var r = t.getBoundingClientRect().right;
                        if (r > maxRight) maxRight = r;
                    });
                    hd.style.maxWidth = (maxRight - groupLeft) + 'px';
                });
            });
        }
        window.addEventListener('resize', function() { alignCatHeaders(); alignLinkHeaders(); });

        function alignLinkHeaders() {
            requestAnimationFrame(function() {
                document.querySelectorAll('#dashContent .link-group').forEach(function(group) {
                    if (group.classList.contains('cat-collapsed')) return;
                    var hd    = group.querySelector('.dash-cat-hd');
                    var pills = group.querySelectorAll('.link-pill');
                    if (!hd || !pills.length) return;
                    var groupLeft = group.getBoundingClientRect().left;
                    var minLeft   = Infinity;
                    var maxRight  = 0;
                    pills.forEach(function(p) {
                        var rect = p.getBoundingClientRect();
                        if (rect.left  < minLeft)  minLeft  = rect.left;
                        if (rect.right > maxRight) maxRight = rect.right;
                    });
                    hd.style.paddingLeft = Math.max(0, minLeft - groupLeft) + 'px';
                    if (maxRight > groupLeft) hd.style.maxWidth = (maxRight - groupLeft) + 'px';
                });
            });
        }

        function _isCatCollapsed(cat) {
            try { return localStorage.getItem('hls-cat-' + cat) === '1'; } catch(e) { return false; }
        }
        function _setCatCollapsed(cat, v) {
            try { v ? localStorage.setItem('hls-cat-' + cat, '1') : localStorage.removeItem('hls-cat-' + cat); } catch(e) {}
        }
        function toggleCat(cat, group) {
            var grid = group.querySelector('.dash-grid');
            var collapsing = !group.classList.contains('cat-collapsed');
            if (collapsing) {
                var h = grid.scrollHeight;
                grid.style.overflow = 'hidden';
                grid.style.height = h + 'px';
                requestAnimationFrame(function() {
                    group.classList.add('cat-collapsed');
                    grid.style.height = '0';
                });
            } else {
                group.classList.remove('cat-collapsed');
                var h = grid.scrollHeight;
                grid.style.height = h + 'px';
                grid.addEventListener('transitionend', function once() {
                    grid.style.height = '';
                    grid.style.overflow = '';
                    grid.removeEventListener('transitionend', once);
                    alignCatHeaders();
                });
            }
            _setCatCollapsed(cat, collapsing);
        }

        function _isLinkCatCollapsed(cat) {
            try { return localStorage.getItem('hls-lnk-' + cat) === '1'; } catch(e) { return false; }
        }
        function _setLinkCatCollapsed(cat, v) {
            try { v ? localStorage.setItem('hls-lnk-' + cat, '1') : localStorage.removeItem('hls-lnk-' + cat); } catch(e) {}
        }
        function toggleLinkCat(cat, group) {
            var strip = group.querySelector('.link-strip');
            var collapsing = !group.classList.contains('cat-collapsed');
            if (collapsing) {
                var h = strip.scrollHeight;
                strip.style.overflow = 'hidden';
                strip.style.height = h + 'px';
                requestAnimationFrame(function() {
                    group.classList.add('cat-collapsed');
                    strip.style.height = '0';
                    strip.style.marginTop = '0';
                });
            } else {
                group.classList.remove('cat-collapsed');
                strip.style.marginTop = '8px';
                var h = strip.scrollHeight;
                strip.style.height = h + 'px';
                strip.addEventListener('transitionend', function once() {
                    strip.style.height = '';
                    strip.style.overflow = '';
                    strip.removeEventListener('transitionend', once);
                    alignLinkHeaders();
                });
            }
            _setLinkCatCollapsed(cat, collapsing);
        }

        loadDashboard();
        fetch(API_BASE + '/api/version').then(function(r){return r.json();}).then(function(d){
            var el = document.getElementById('appVersion');
            if (el && d.version) el.textContent = 'v' + d.version;
        }).catch(function(){});
    </script>
</body>
</html>
