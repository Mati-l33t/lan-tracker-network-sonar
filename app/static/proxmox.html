<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HomeLab Sonar — Proxmox</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;500;600;700&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
    <link rel="icon" id="faviconEl" href="/static/logo.png">
    <style>
        :root, [data-theme="dark"] {
            --bg: #0d0d0f; --bg2: #111115; --surface: #18181d; --surface2: #1f1f26;
            --border: #2c2c38; --text: #e0e0e8; --text-muted: #666676; --text-dim: #38383f;
            --accent: #22d3ee; --accent-glow: rgba(34,211,238,0.14); --accent-strong: rgba(34,211,238,0.3);
            --accent2: #f59e0b; --accent2-glow: rgba(245,158,11,0.22);
            --active: #34d399; --active-bg: rgba(52,211,153,0.09);
            --inactive: #fb923c; --inactive-bg: rgba(251,146,60,0.09);
            --danger: #f43f5e; --danger-bg: rgba(244,63,94,0.1);
            --static-c: #a78bfa; --static-bg: rgba(167,139,250,0.09);
            --dhcp-c: #f472b6; --dhcp-bg: rgba(244,114,182,0.09);
            --overlay: rgba(0,0,0,0.85); --shadow: 0 8px 40px rgba(0,0,0,0.7);
        }
        [data-theme="light"] {
            --bg: #f4ede0; --bg2: #ece4d4; --surface: #fdf8f0; --surface2: #f5ede0;
            --border: #c8b89a; --text: #1a2a38; --text-muted: #7a6a54; --text-dim: #b0a088;
            --accent: #1e3d6b; --accent-glow: rgba(30,61,107,0.14); --accent-strong: rgba(30,61,107,0.28);
            --accent2: #b84010; --accent2-glow: rgba(184,64,16,0.2);
            --active: #1a6b45; --active-bg: rgba(26,107,69,0.1);
            --inactive: #a05c14; --inactive-bg: rgba(160,92,20,0.1);
            --danger: #be1d3c; --danger-bg: rgba(190,29,60,0.1);
            --static-c: #4f38c2; --static-bg: rgba(79,56,194,0.1);
            --dhcp-c: #9d174d; --dhcp-bg: rgba(157,23,77,0.1);
            --overlay: rgba(10,5,0,0.7); --shadow: 0 8px 40px rgba(0,0,0,0.18);
        }
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        @keyframes fade-up { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
        @keyframes slide-down { from { opacity:0; transform:translateY(-16px); } to { opacity:1; transform:translateY(0); } }
        @keyframes breathe { 0%,100% { opacity:1; } 50% { opacity:0.55; } }
        html { scroll-behavior:smooth; }
        body { background:var(--bg); color:var(--text); font-family:'Chakra Petch',sans-serif; min-height:100vh; overflow-x:hidden; transition:background 0.4s,color 0.4s; }
        body::before {
            content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
            background: radial-gradient(ellipse 70% 55% at 0% 0%, rgba(34,211,238,0.07) 0%, transparent 65%),
                        radial-gradient(ellipse 55% 45% at 100% 100%, rgba(167,139,250,0.07) 0%, transparent 65%),
                        radial-gradient(ellipse 40% 35% at 75% 10%, rgba(245,158,11,0.04) 0%, transparent 60%);
        }
        [data-theme="light"] body::before {
            background: radial-gradient(ellipse 70% 55% at 0% 0%, rgba(30,61,107,0.06) 0%, transparent 65%),
                        radial-gradient(ellipse 50% 40% at 100% 100%, rgba(184,64,16,0.05) 0%, transparent 65%);
        }
        [data-theme="light"] .pve-tab.active,
        [data-theme="light"] .tf-btn.active { color:#fff; }
        body::after { display:none; }
        .wrap { padding:28px 28px 0; position:relative; z-index:1; }
        .s1 { animation:fade-up 0.55s ease 0.00s both; }
        .s2 { animation:fade-up 0.55s ease 0.07s both; }
        .s3 { animation:fade-up 0.55s ease 0.14s both; }
        .s7 { animation:fade-up 0.55s ease 0.42s both; }
        header { display:flex; align-items:center; justify-content:space-between; padding-bottom:18px; margin-bottom:0; position:relative; }
        header::after { content:''; position:absolute; bottom:0; left:0; right:0; height:1px; background:linear-gradient(to right,transparent,var(--accent) 30%,var(--accent) 70%,transparent); opacity:0.5; }
        .logo { display:flex; align-items:center; gap:14px; }
        .logo-text-block { line-height:1; }
        .logo-name { font-size:1.4rem; font-weight:700; letter-spacing:0.18em; text-transform:uppercase; color:var(--text); }
        .logo-name em { font-style:normal; color:var(--accent); transition:color 0.4s; }
        .logo-sub { font-size:0.58rem; letter-spacing:0.35em; text-transform:uppercase; color:var(--text-muted); margin-top:4px; font-weight:400; }
        .header-btns { display:flex; align-items:center; gap:8px; }
        .hdr-icon-btn { width:36px; height:36px; background:none; border:none; border-radius:8px; cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--text-muted); flex-shrink:0; transition:color 0.2s,background 0.2s; }
        .hdr-icon-btn svg { width:18px; height:18px; transition:transform 0.3s; }
        .hdr-icon-btn:hover { color:var(--accent); background:var(--surface2); }
        .hdr-icon-btn:hover svg { transform:rotate(30deg); }
        .hdr-icon-btn.active { color:var(--accent); background:var(--accent-glow); }
        .upd-dot { position:absolute; top:5px; right:5px; width:7px; height:7px; border-radius:50%; background:#f59e0b; border:2px solid var(--bg); pointer-events:none; display:none; }
        .upd-dot.show { display:block; }
        /* ── PAGE NAV ─── */
        .page-nav { display:flex; align-items:stretch; gap:0; margin-top:0; margin-bottom:0; }
        .nav-link { padding:10px 20px; color:var(--text-muted); text-decoration:none; font-size:0.72rem; font-weight:600; letter-spacing:0.12em; text-transform:uppercase; position:relative; transition:color 0.2s; white-space:nowrap; }
        .nav-link:hover { color:var(--text); }
        .nav-link.active { color:var(--accent); }
        .nav-link.active::after { content:''; position:absolute; bottom:-1px; left:12px; right:12px; height:2px; background:var(--accent); border-radius:2px 2px 0 0; }
        .nav-link-right { margin-left:auto; }
        /* ── NOTIFICATIONS ─── */
        #statusContainer { position:fixed; bottom:24px; right:24px; z-index:3000; display:flex; flex-direction:column; align-items:flex-end; gap:8px; max-width:calc(100vw - 48px); width:fit-content; }
        .notif { padding:11px 16px; border-radius:8px; font-size:0.75rem; font-weight:600; letter-spacing:0.06em; border:1px solid; white-space:nowrap; width:fit-content; animation:slide-down 0.3s ease; }
        .notif-ok  { background:var(--active-bg);  color:var(--active);  border-color:var(--active); }
        .notif-err { background:var(--danger-bg);  color:var(--danger);  border-color:var(--danger); }
        /* ── BUTTONS ─── */
        .btn { display:inline-flex; align-items:center; gap:7px; padding:9px 18px; border-radius:7px; border:1px solid var(--border); background:var(--surface2); color:var(--text); font-family:'Chakra Petch',sans-serif; font-size:0.72rem; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; cursor:pointer; transition:all 0.2s ease; white-space:nowrap; }
        .btn:hover { border-color:var(--accent); color:var(--accent); transform:translateY(-1px); }
        .btn:active { transform:translateY(0) scale(0.98); }
        /* ── FOOTER ─── */
        footer { margin-top:48px; padding:20px 0 28px; position:relative; text-align:center; font-size:0.62rem; color:var(--text-muted); letter-spacing:0.22em; text-transform:uppercase; }
        footer::before { content:''; position:absolute; top:0; left:0; right:0; height:1px; background:linear-gradient(to right,transparent,var(--accent) 30%,var(--accent) 70%,transparent); opacity:0.5; }
        footer a { color:var(--accent); text-decoration:none; }
        footer a:hover { text-decoration:underline; }
        /* ── PROXMOX ─── */
        .pve-tab-bar { display:flex; gap:8px; margin-bottom:16px; padding-top:4px; }
        .pve-tab { padding:5px 14px; border-radius:6px; border:1px solid var(--border); background:transparent; cursor:pointer; font-family:'Chakra Petch',sans-serif; font-size:0.72rem; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:var(--text-muted); transition:all 0.15s; text-decoration:none; display:inline-flex; align-items:center; }
        .pve-tab.active { background:var(--accent); color:#0d0d0f; border-color:var(--accent); }
        .pve-tab:hover:not(.active) { background:var(--surface2); color:var(--text); }
        .pve-subview.hidden { display:none !important; }
        /* ── SUMMARY STRIP ─── */
        .stat-strip { display:flex; align-items:center; gap:8px; padding:7px 0 12px; font-size:0.72rem; flex-wrap:wrap; }
        .sstat { display:flex; align-items:center; gap:3px; }
        .sstat-val { font-weight:700; font-variant-numeric:tabular-nums; color:var(--text); }
        .sstat-lbl { color:var(--text-muted); }
        .sstat--vm    .sstat-val { color:var(--accent); }
        .sstat--ct    .sstat-val { color:var(--active); }
        .sstat--alert .sstat-val { color:var(--inactive); }
        .sstat-sep { color:var(--border); padding:0 1px; }
        .pve-host-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:16px; margin-bottom:12px; }
        .pve-host-hd { display:flex; align-items:center; gap:10px; margin-bottom:12px; flex-wrap:wrap; }
        .pve-host-hd h3 { margin:0; font-size:0.95rem; font-weight:600; }
        .pve-host-addr { font-size:0.75rem; color:var(--text-muted); }
        .pve-polled { font-size:0.7rem; color:var(--text-dim); margin-left:auto; }
        .pve-stat-row { display:grid; grid-template-columns:52px 1fr 70px; align-items:center; gap:10px; margin-bottom:6px; font-size:0.82rem; }
        .pve-stat-row label { color:var(--text-muted); font-size:0.75rem; }
        .pve-bar { height:7px; background:var(--surface2); border-radius:4px; overflow:hidden; }
        .pve-bar-fill { height:100%; background:var(--accent); border-radius:4px; transition:width 0.5s ease; }
        .pve-inline-stats { display:flex; gap:16px; font-size:0.75rem; color:var(--text-muted); margin-top:4px; margin-bottom:8px; }
        .pve-coll { margin-top:10px; }
        .pve-coll summary { cursor:pointer; font-size:0.78rem; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:var(--text-muted); padding:4px 0; user-select:none; list-style:none; display:flex; align-items:center; gap:6px; }
        .pve-coll summary:hover { color:var(--text); }
        .pve-coll summary::before { content:'›'; font-size:1rem; transition:transform 0.2s; }
        .pve-coll[open] summary::before { transform:rotate(90deg); }
        .pve-tbl-wrap { overflow-x:auto; margin-top:8px; }
        .pve-tbl { width:100%; border-collapse:collapse; font-size:0.8rem; }
        .pve-tbl th, .pve-tbl td { padding:7px 8px; text-align:left; border-bottom:1px solid var(--border); white-space:nowrap; }
        .pve-tbl th { font-size:0.68rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--text-muted); font-weight:600; }
        .pve-pill { display:inline-block; padding:2px 8px; border-radius:99px; font-size:0.7rem; font-weight:600; text-transform:capitalize; }
        .pve-pill-running { background:rgba(52,211,153,0.12); color:var(--active);   border:1px solid rgba(52,211,153,0.3); }
        .pve-pill-stopped { background:rgba(251,146,60,0.12); color:var(--inactive); border:1px solid rgba(251,146,60,0.3); }
        .pve-pill-paused  { background:rgba(245,158,11,0.12); color:var(--accent2);  border:1px solid rgba(245,158,11,0.3); }
        .pve-type-tag { font-family:'Courier Prime',monospace; font-size:0.68rem; background:var(--surface2); border:1px solid var(--border); padding:1px 5px; border-radius:4px; }
        .pve-stor-list { padding:8px 0; }
        .pve-stor-row { margin-bottom:8px; }
        .pve-stor-lbl { display:flex; gap:8px; font-size:0.77rem; margin-bottom:4px; align-items:center; }
        .pve-stor-lbl span:last-child { margin-left:auto; color:var(--text-muted); }
        .pve-stor-type { font-size:0.7rem; color:var(--text-dim); }
        .pve-empty-state { text-align:center; padding:32px 16px; color:var(--text-muted); font-size:0.85rem; }
        .pve-empty { text-align:center; color:var(--text-dim); padding:12px; font-size:0.8rem; }
        .pve-form-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:16px; margin-bottom:14px; }
        .pve-form-card h4 { font-size:0.75rem; font-weight:600; letter-spacing:0.15em; text-transform:uppercase; color:var(--text-muted); margin-bottom:14px; }
        .pve-form-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
        .pve-fg { display:flex; flex-direction:column; gap:4px; }
        .pve-fg label { font-size:0.62rem; font-weight:600; letter-spacing:0.18em; text-transform:uppercase; color:var(--text-muted); }
        .pve-fg input[type="text"],.pve-fg input[type="password"],.pve-fg input[type="number"] { background:var(--bg2); border:1px solid var(--border); border-radius:7px; padding:8px 11px; color:var(--text); font-family:'Chakra Petch',sans-serif; font-size:0.85rem; outline:none; transition:border-color 0.2s; }
        .pve-fg input:focus { border-color:var(--accent); }
        .pve-form-row { display:flex; align-items:center; gap:10px; margin-top:8px; flex-wrap:wrap; }
        .pve-check-lbl { display:flex; align-items:center; gap:6px; font-size:0.78rem; cursor:pointer; color:var(--text-muted); }
        .pve-btn { padding:6px 13px; border-radius:7px; border:1px solid var(--border); background:transparent; color:var(--text); font-family:'Chakra Petch',sans-serif; font-size:0.72rem; font-weight:600; letter-spacing:0.08em; cursor:pointer; transition:background 0.15s,color 0.15s; }
        .pve-btn:hover { background:var(--surface2); }
        .pve-btn-accent { background:var(--accent); color:#0d0d0f; border-color:var(--accent); }
        .pve-btn-accent:hover { opacity:0.85; background:var(--accent); }
        .pve-btn-danger { color:var(--danger); border-color:rgba(244,63,94,0.3); }
        .pve-btn-danger:hover { background:var(--danger-bg); }
        .pve-btn-sm { padding:3px 8px; font-size:0.68rem; }
        .pve-power-btn { padding:3px 7px; color:var(--text-muted); }
        .pve-power-btn:hover { color:var(--text); background:var(--surface2); }
        .pve-sortable { cursor:pointer; user-select:none; white-space:nowrap; }
        .pve-sortable:hover { color:var(--accent); }
        .pve-sort-arrow { margin-left:4px; opacity:0.3; font-size:0.7rem; }
        .pve-sort-arrow.active { opacity:1; color:var(--accent); }
        .pve-action-menu { position:fixed; background:var(--surface); border:1px solid var(--border); border-radius:9px; padding:5px; min-width:148px; z-index:2000; box-shadow:0 8px 28px rgba(0,0,0,0.45); display:none; animation:slide-down 0.12s ease; }
        .pve-action-menu.open { display:block; }
        .pve-action-item { display:flex; align-items:center; gap:9px; width:100%; padding:7px 11px; border:none; background:none; color:var(--text); font-family:'Chakra Petch',sans-serif; font-size:0.78rem; font-weight:500; letter-spacing:0.05em; cursor:pointer; border-radius:5px; text-align:left; white-space:nowrap; transition:background 0.1s; }
        .pve-action-item:hover:not([disabled]) { background:var(--surface2); }
        .pve-action-item[disabled] { opacity:0.28; cursor:default; pointer-events:none; }
        .pve-action-item svg { width:13px; height:13px; flex-shrink:0; }
        .pve-ai-start    { color:var(--active); }
        .pve-ai-shutdown { color:var(--text); }
        .pve-ai-reboot   { color:var(--accent2); }
        .pve-ai-stop     { color:var(--danger); }
        .pve-action-sep  { height:1px; background:var(--border); margin:4px 6px; }
        .pve-mono { font-family:'Courier Prime',monospace; font-size:0.78rem; color:var(--text-muted); }
        /* ── OVERVIEW EXTRAS ─── */
        .pve-info-line { font-size:0.72rem; color:var(--text-muted); margin-bottom:12px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .pve-metric-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:4px; }
        .pve-metric-box { background:var(--bg2); border:1px solid var(--border); border-radius:10px; padding:14px 14px 10px; transition:border-color 0.2s,box-shadow 0.2s; }
        .pve-metric-box:hover { border-color:var(--accent); box-shadow:0 0 0 1px var(--accent-glow),0 4px 24px rgba(0,0,0,0.3); }
        .pve-metric-hd { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px; }
        .pve-metric-label { font-size:0.58rem; font-weight:600; letter-spacing:0.22em; text-transform:uppercase; color:var(--text-muted); padding-top:3px; }
        .pve-metric-val { font-size:1.3rem; font-weight:700; font-variant-numeric:tabular-nums; line-height:1; }
        .pve-metric-sub { font-size:0.65rem; color:var(--text-muted); margin-top:3px; text-align:right; font-variant-numeric:tabular-nums; }
        .pve-metric-ft { display:flex; gap:12px; font-size:0.63rem; color:var(--text-dim); margin-top:7px; flex-wrap:wrap; }
        .pve-metric-ft b { color:var(--text-muted); font-weight:400; }
        /* ── TIME-RANGE BUTTONS ─── */
        .tf-btn { padding:4px 10px; border-radius:5px; border:1px solid var(--border); background:transparent; cursor:pointer; font-family:'Chakra Petch',sans-serif; font-size:0.65rem; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:var(--text-muted); transition:all 0.15s; }
        .tf-btn.active { background:var(--accent); color:#0d0d0f; border-color:var(--accent); }
        .tf-btn:hover:not(.active) { background:var(--surface2); color:var(--text); }
        @media (max-width:640px) { .pve-form-grid { grid-template-columns:1fr; } .pve-stat-row { grid-template-columns:44px 1fr 55px; } .pve-metric-grid { grid-template-columns:1fr; } }
        @media (max-width:600px) { .wrap { padding:16px 16px 0; } header { flex-direction:column; align-items:flex-start; gap:12px; } .header-btns { align-self:flex-end; } #statusContainer { bottom:16px; right:16px; max-width:calc(100vw - 32px); } }
        @media (max-width:600px) {
            .pve-tab-bar { overflow-x:auto; flex-wrap:nowrap; gap:5px; scrollbar-width:none; -webkit-overflow-scrolling:touch; }
            .pve-tab-bar::-webkit-scrollbar { display:none; }
            .pve-tab { flex-shrink:0; padding:5px 10px; font-size:0.65rem; letter-spacing:0.05em; }
        }
        #backToTop { position:fixed; bottom:28px; right:28px; width:40px; height:40px; border-radius:50%; background:var(--surface2); border:1px solid var(--border); color:var(--accent); cursor:pointer; display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:opacity 0.25s,transform 0.25s,background 0.2s; z-index:500; box-shadow:0 4px 16px rgba(0,0,0,0.4); }
        #backToTop.visible { opacity:1; pointer-events:auto; }
        #backToTop:hover { background:var(--accent-glow); transform:translateY(-2px); }
    </style>
</head>
<body>
    <button id="backToTop" onclick="window.scrollTo({top:0,behavior:'smooth'})" title="Back to top">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="18 15 12 9 6 15"/></svg>
    </button>
    <div id="pve-chart-tip" style="display:none;position:fixed;z-index:3001;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:6px 10px;font-size:0.75rem;font-family:'Courier Prime',monospace;color:var(--text);pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,0.5);line-height:1.5;white-space:nowrap;"></div>
    <div class="wrap">
        <header class="s1">
            <div class="logo">
                <img id="headerLogo" src="/static/logo.png" alt="Logo" style="width:64px;height:64px;object-fit:contain;">
                <div class="logo-text-block">
                    <div class="logo-name">HOME<em>LAB</em> SONAR</div>
                    <div class="logo-sub" id="logoSub" style="display:none;"></div>
                </div>
            </div>
            <div class="header-btns">
                <div style="position:relative;display:inline-flex;">
                    <a href="/settings" class="hdr-icon-btn" id="settingsGearLink" title="Settings">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
                    </a>
                    <span class="upd-dot" id="updateDot" title="Update available — open Settings"></span>
                </div>
                <button class="hdr-icon-btn" onclick="document.getElementById('logoutForm').submit()" title="Log out">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                </button>
                <form id="logoutForm" action="/logout" method="post" style="display:none"></form>
            </div>
        </header>

        <nav class="page-nav s2">
            <a href="/dashboard" class="nav-link">Dashboard</a>
            <a href="/proxmox/overview" class="nav-link active">Proxmox</a>
            <a href="/network/devices" class="nav-link">Network</a>
        </nav>
        <div class="pve-tab-bar s2" style="margin-top:10px;margin-bottom:0;">
            <a href="/proxmox/overview" class="pve-tab" id="subtab-overview">Overview</a>
            <a href="/proxmox/vmscontainers" class="pve-tab" id="subtab-vmscontainers">VMs &amp; Containers</a>
            <a href="/proxmox/storage" class="pve-tab" id="subtab-storage">Storage</a>
            <a href="/proxmox/backups" class="pve-tab" id="subtab-backups">Backups</a>
        </div>

        <div class="stat-strip">
            <button class="btn" onclick="PVE.forceRefresh()" style="font-size:0.68rem;padding:7px 14px;">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
                Refresh
            </button>
            <span class="sstat sstat--vm"><span class="sstat-val" id="pve-total-vms">—</span> <span class="sstat-lbl">VMs</span></span>
            <span class="sstat-sep">·</span>
            <span class="sstat sstat--ct"><span class="sstat-val" id="pve-total-cts">—</span> <span class="sstat-lbl">containers</span></span>
            <span class="sstat-sep">·</span>
            <span class="sstat"><span class="sstat-val" id="pve-total-nodes">—</span> <span class="sstat-lbl">nodes</span></span>
            <span class="sstat-sep">·</span>
            <span class="sstat sstat--alert"><span class="sstat-val" id="pve-alerts">—</span> <span class="sstat-lbl">stopped</span></span>
            <div id="pve-tf-btns" style="display:none;gap:4px;align-items:center;margin-left:auto;">
                <button class="tf-btn" id="tf-hour"  onclick="PVE.setTimeframe('hour')">1h</button>
                <button class="tf-btn" id="tf-day"   onclick="PVE.setTimeframe('day')">1d</button>
                <button class="tf-btn" id="tf-week"  onclick="PVE.setTimeframe('week')">1w</button>
                <button class="tf-btn" id="tf-month" onclick="PVE.setTimeframe('month')">1m</button>
            </div>
        </div>

        <div id="statusContainer"></div>

        <div class="s3">
            <div>
                <div id="pve-host-cards"></div>
            </div>
        </div>

        <footer class="s7">
            <p>© 2026 <a href="https://github.com/Mati-l33t" target="_blank" rel="noopener">Mati-l33t</a> &nbsp;·&nbsp; Homelab Sonar &nbsp;·&nbsp; <a href="https://github.com/Mati-l33t/lan-tracker-network-sonar/releases" target="_blank" rel="noopener" id="appVersion"></a></p>
        </footer>
    </div>

    <script>
        const API_BASE = window.location.origin;

        (function() {
            var saved = localStorage.getItem('lant-theme');
            if (saved) document.documentElement.setAttribute('data-theme', saved);
        })();

        fetch('/api/subtitle').then(function(r){ return r.json(); }).then(function(d){
            var el = document.getElementById('logoSub');
            if (d.subtitle) { el.textContent = d.subtitle; el.style.display = ''; }
            if (d.logo_url) { document.getElementById('headerLogo').src = d.logo_url; document.getElementById('faviconEl').href = d.logo_url; }
        }).catch(function(){});

        /* ── AUTO UPDATE CHECK ── */
        (function(){
            var KEY = 'hls-upd', TTL = 6 * 3600 * 1000;
            function showDot() {
                var dot = document.getElementById('updateDot');
                if (dot) dot.classList.add('show');
            }
            var c; try { c = JSON.parse(localStorage.getItem(KEY)); } catch(e) {}
            if (c && (Date.now() - c.ts) < TTL) {
                if (c.available) showDot();
            } else {
                fetch('/api/check-update').then(function(r){ return r.json(); }).then(function(d){
                    try { localStorage.setItem(KEY, JSON.stringify({ts: Date.now(), available: d.update_available, latest: d.latest})); } catch(e) {}
                    if (d.update_available) showDot();
                }).catch(function(){});
            }
        })();

        function toggleTheme() {
            var html = document.documentElement;
            var next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            localStorage.setItem('lant-theme', next);
        }

        function esc(s) {
            if (!s) return '';
            return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
        }

        function showStatus(msg) {
            document.getElementById('statusContainer').innerHTML = '<div class="notif notif-ok">' + esc(msg) + '</div>';
            setTimeout(function() { document.getElementById('statusContainer').innerHTML = ''; }, 3000);
        }
        function showError(msg) {
            document.getElementById('statusContainer').innerHTML = '<div class="notif notif-err">' + esc(msg) + '</div>';
            setTimeout(function() { document.getElementById('statusContainer').innerHTML = ''; }, 5000);
        }

        var TF_INTERVAL = { hour: 1, day: 30, week: 180, month: 720 };

        var PVE = {
            _interval:    null,
            _initialized: false,
            _sort:        { col:'id', dir:1 },
            _bkpSort:     { col:'vmid', dir:1 },
            _timeframe:   localStorage.getItem('pve-tf') || 'hour',
            _lastData:    null,

            init: function() {
                if (this._initialized) return;
                this._initialized = true;
                this.loadData();
                this._interval = setInterval(function() { PVE.loadData(); }, 30000);
            },

            setTimeframe: function(tf) {
                this._timeframe = tf;
                localStorage.setItem('pve-tf', tf);
                ['hour','day','week','month'].forEach(function(t) {
                    var b = document.getElementById('tf-' + t);
                    if (b) b.classList.toggle('active', t === tf);
                });
                if (this._lastData) this.renderOverview(this._lastData);
            },

            forceRefresh: async function() {
                showStatus('Refreshing Proxmox data…');
                try {
                    await fetch(API_BASE + '/api/proxmox/refresh', { method:'POST' });
                    await PVE.loadData();
                    showStatus('Proxmox data refreshed');
                } catch(e) { showError('Refresh failed: ' + e.message); }
            },

            loadData: async function() {
                try {
                    var res  = await fetch(API_BASE + '/api/proxmox/data');
                    var data = await res.json();
                    PVE._lastData = data;
                    PVE.renderOverview(data);
                } catch(e) { console.error('Proxmox data fetch failed:', e); }
            },

            renderOverview: function(data) {
                var hosts = data.hosts || [];
                var totalVMs = 0, totalCTs = 0, totalNodes = 0, alerts = 0;
                hosts.forEach(function(h) {
                    totalVMs   += (h.vms        || []).length;
                    totalCTs   += (h.containers || []).length;
                    totalNodes += (h.nodes      || []).length;
                    (h.vms        || []).forEach(function(v) { if (v.status !== 'running') alerts++; });
                    (h.containers || []).forEach(function(c) { if (c.status !== 'running') alerts++; });
                });
                document.getElementById('pve-total-vms').textContent   = totalVMs;
                document.getElementById('pve-total-cts').textContent   = totalCTs;
                document.getElementById('pve-total-nodes').textContent = totalNodes;
                document.getElementById('pve-alerts').textContent      = alerts;

                var container = document.getElementById('pve-host-cards');
                if (!container) return;
                if (hosts.length === 0) {
                    container.innerHTML = '<div class="pve-empty-state"><p>No Proxmox hosts configured.</p>' +
                        '<a href="/settings#proxmox" class="btn" style="margin-top:12px;font-size:0.72rem;text-decoration:none">Add a host →</a></div>';
                    return;
                }
                var subPage = window.location.pathname.split('/').pop() || 'overview';
                container.innerHTML = hosts.map(function(h) { return PVE.renderHostCard(h, subPage); }).join('');
                var errIds = Object.keys(data.errors || {});
                errIds.forEach(function(id) {
                    var card = document.getElementById('pve-card-' + id);
                    if (card) card.insertAdjacentHTML('afterbegin', '<div style="color:var(--danger);font-size:0.78rem;margin-bottom:8px;">⚠ ' + esc(data.errors[id]) + '</div>');
                });
            },

            renderHostCard: function(host, subPage) {
                var node    = (host.nodes || [])[0] || {};
                var cpuPct  = node.cpu_usage || 0;
                var memUsed = pveBytes(node.mem_used  || 0);
                var memTot  = pveBytes(node.mem_total || 1);
                var memPct  = node.mem_total ? Math.round((node.mem_used / node.mem_total) * 100) : 0;
                var uptime  = pveUptime(node.uptime || 0);
                var polled  = host.polled_at
                    ? new Date(host.polled_at + 'Z').toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})
                    : '—';
                var cpuColor = cpuPct > 85 ? 'var(--danger)' : cpuPct > 70 ? 'var(--inactive)' : 'var(--accent)';
                var memColor = memPct > 85 ? 'var(--danger)' : memPct > 70 ? 'var(--inactive)' : 'var(--accent)';

                var cardHead = '<div class="pve-host-card" id="pve-card-' + host.host_id + '">' +
                    '<div class="pve-host-hd"><h3>' + esc(host.label) + '</h3><span class="pve-host-addr">' + esc(host.host) + '</span><span class="pve-polled">polled ' + polled + '</span></div>';

                if (subPage === 'overview') {
                    var loadStr  = (node.load_avg || []).join(' / ');
                    var cpuModel = (node.cpu_model || '').replace(/\(R\)/g,'').replace(/\(TM\)/g,'').replace(/\s*CPU\s*@.*$/,'').replace(/\s*@.*$/,'').trim();
                    var cpuGhz   = node.cpu_mhz ? (parseFloat(node.cpu_mhz) / 1000).toFixed(2) + ' GHz' : '';
                    var cpuDesc  = node.cpu_threads ? node.cpu_cores + 'C / ' + node.cpu_threads + 'T' : (node.cpu_cores ? node.cpu_cores + 'C' : '');
                    var pveVer   = node.pve_version ? 'PVE ' + node.pve_version : '';
                    var infoLine = [pveVer, cpuModel, cpuDesc, cpuGhz].filter(Boolean).join(' · ');

                    // Build forward-filled point arrays from rrd data
                    var rrd = node['rrd_' + PVE._timeframe] || node.rrd_hour || [];
                    var cpuPts = [], ramPts = [], swapPts = [], rootPts = [], netinPts = [], netoutPts = [], iowaitPts = [];
                    var lc = null, lr = null, ls = null, lo = null, lni = null, lno = null, liow = null;
                    for (var ri = 0; ri < rrd.length; ri++) {
                        var pt = rrd[ri];
                        if (pt.cpu     != null) lc  = Math.round(pt.cpu * 1000) / 10;
                        if (lc  != null) cpuPts.push(lc);
                        if (pt.iowait  != null) liow = Math.round(pt.iowait * 1000) / 10;
                        if (liow != null) iowaitPts.push(liow);
                        var rv  = (pt.memused  != null && pt.memtotal  && pt.memtotal  > 0) ? Math.round(pt.memused  / pt.memtotal  * 1000) / 10 : null;
                        var sv  = (pt.swapused != null && pt.swaptotal && pt.swaptotal > 0) ? Math.round(pt.swapused / pt.swaptotal * 1000) / 10 : null;
                        var ov  = (pt.rootused != null && pt.roottotal && pt.roottotal > 0) ? Math.round(pt.rootused / pt.roottotal * 1000) / 10 : null;
                        if (rv  != null) lr  = rv;  if (lr  != null) ramPts.push(lr);
                        if (sv  != null) ls  = sv;  if (ls  != null) swapPts.push(ls);
                        if (ov  != null) lo  = ov;  if (lo  != null) rootPts.push(lo);
                        if (pt.netin   != null) lni = pt.netin;
                        if (pt.netout  != null) lno = pt.netout;
                        if (lni != null) netinPts.push(lni);
                        if (lno != null) netoutPts.push(lno);
                    }

                    // Current + peak values
                    var nowCpu    = cpuPts.length    ? cpuPts[cpuPts.length - 1]       : null;
                    var nowRam    = ramPts.length    ? ramPts[ramPts.length - 1]       : null;
                    var nowSwap   = swapPts.length   ? swapPts[swapPts.length - 1]     : null;
                    var nowRoot   = rootPts.length   ? rootPts[rootPts.length - 1]     : null;
                    var nowNetIn  = netinPts.length  ? netinPts[netinPts.length - 1]   : null;
                    var nowNetOut = netoutPts.length ? netoutPts[netoutPts.length - 1] : null;
                    var pkCpu    = cpuPts.length    ? Math.max.apply(null, cpuPts)    : null;
                    var pkRam    = ramPts.length    ? Math.max.apply(null, ramPts)    : null;
                    var avgCpu   = cpuPts.length    ? (cpuPts.reduce(function(a,b){return a+b;},0)/cpuPts.length)    : null;
                    var nowIoWait = iowaitPts.length ? iowaitPts[iowaitPts.length - 1] : null;
                    var pkIoWait  = iowaitPts.length ? Math.max.apply(null, iowaitPts)  : null;
                    var pkNetIn  = netinPts.length  ? Math.max.apply(null, netinPts)  : null;
                    var pkNetOut = netoutPts.length ? Math.max.apply(null, netoutPts) : null;

                    var gCpu = 'gc' + host.host_id, gRam  = 'gr' + host.host_id;
                    var gSwap = 'gs' + host.host_id, gRoot = 'go' + host.host_id;
                    var gNI  = 'gni' + host.host_id, gNO  = 'gno' + host.host_id;

                    var swapUsed = pveBytes(node.swap_used    || 0), swapTot = pveBytes(node.swap_total  || 0);
                    var rootUsed = pveBytes(node.rootfs_used  || 0), rootTot = pveBytes(node.rootfs_total || 0);
                    var pctFmt   = function(v) { return v.toFixed(1) + '%'; };
                    var bytesFmt = function(v) { return pveBytes(v) + '/s'; };

                    var cpuBox = metricBox(
                        'CPU',
                        (nowCpu != null ? nowCpu.toFixed(1) : cpuPct) + '%', '',
                        cpuPts.length ? cpuPts : [cpuPct], 'var(--accent)', gCpu, pctFmt,
                        (pkCpu    != null ? '<b>peak</b> ' + pkCpu.toFixed(1)  + '%' : '') +
                        (avgCpu   != null ? '<b>avg</b> '  + avgCpu.toFixed(1) + '%' : '') +
                        (nowIoWait != null ? '<b style="color:var(--accent2)">io wait</b> ' + nowIoWait.toFixed(1) + '%' : ''),
                        { isPct: true, overlay: iowaitPts.length > 1 ? { pts: iowaitPts, color: '#f59e0b' } : null }
                    );
                    var ramBox = metricBox(
                        'RAM',
                        (nowRam != null ? nowRam.toFixed(1) : memPct) + '%', memUsed + ' / ' + memTot,
                        ramPts.length ? ramPts : [memPct], 'var(--active)', gRam, pctFmt,
                        pkRam != null ? '<b>peak</b> ' + pkRam.toFixed(1) + '%' : '',
                        { isPct: true }
                    );
                    var swapBox = node.swap_total ? metricBox(
                        'Swap',
                        nowSwap != null ? nowSwap.toFixed(1) + '%' : '—', swapUsed + ' / ' + swapTot,
                        swapPts.length ? swapPts : [0], 'var(--accent2)', gSwap, pctFmt, '',
                        { isPct: true }
                    ) : '<div class="pve-metric-box" style="opacity:0.35;"><div class="pve-metric-hd"><span class="pve-metric-label">Swap</span><span class="pve-metric-val" style="color:var(--text-dim)">—</span></div><div style="height:70px;background:var(--bg2);border-radius:6px;"></div><div class="pve-metric-ft">not configured</div></div>';
                    var rootBox = node.rootfs_total ? metricBox(
                        'Root disk',
                        nowRoot != null ? nowRoot.toFixed(1) + '%' : '—', rootUsed + ' / ' + rootTot,
                        rootPts.length ? rootPts : [0], 'var(--static-c)', gRoot, pctFmt, '',
                        { isPct: true }
                    ) : '';
                    var netInBox = metricBox(
                        'Net ↓ in',
                        nowNetIn != null ? pveBytes(nowNetIn) + '/s' : '—', '',
                        netinPts.length ? netinPts : [0], '#38bdf8', gNI, bytesFmt,
                        pkNetIn != null ? '<b>peak</b> ' + pveBytes(pkNetIn) + '/s' : '',
                        { isPct: false }
                    );
                    var netOutBox = metricBox(
                        'Net ↑ out',
                        nowNetOut != null ? pveBytes(nowNetOut) + '/s' : '—', '',
                        netoutPts.length ? netoutPts : [0], '#fb923c', gNO, bytesFmt,
                        pkNetOut != null ? '<b>peak</b> ' + pveBytes(pkNetOut) + '/s' : '',
                        { isPct: false }
                    );

                    return cardHead +
                        (infoLine ? '<div class="pve-info-line">' + esc(infoLine) + '</div>' : '') +
                        '<div class="pve-metric-grid">' + cpuBox + ramBox + swapBox + rootBox + netInBox + netOutBox + '</div>' +
                        '<div class="pve-inline-stats" style="margin-top:10px">' +
                            '<span>Uptime: ' + uptime + '</span>' +
                            (loadStr ? '<span>Load: ' + loadStr + '</span>' : '') +
                        '</div>' +
                    '</div>';
                }

                if (subPage === 'vmscontainers') {
                    var allGuests = [].concat(host.vms || [], host.containers || []);
                    var sc = PVE._sort.col, sd = PVE._sort.dir;
                    var sortVal = function(v, c) {
                        if (c === 'status') return v.status || '';
                        if (c === 'name')   return (v.name || String(v.vmid)).toLowerCase();
                        if (c === 'type')   return (v.type === 'qemu' ? '0' : '1') + String(v.vmid).padStart(6,'0');
                        if (c === 'id')     return v.vmid  || 0;
                        if (c === 'node')   return v.node  || '';
                        if (c === 'cpu')    return v.cpu   || 0;
                        if (c === 'ram')    return v.mem   || 0;
                        if (c === 'uptime') return v.uptime || 0;
                        return '';
                    };
                    allGuests = allGuests.slice().sort(function(a,b) {
                        var av = sortVal(a,sc), bv = sortVal(b,sc);
                        if (av < bv) return -sd; if (av > bv) return sd; return 0;
                    });
                    var hdrArrow = function(col) {
                        if (sc !== col) return '<span class="pve-sort-arrow">⇅</span>';
                        return '<span class="pve-sort-arrow active">' + (sd === 1 ? '↑' : '↓') + '</span>';
                    };
                    var thClick = function(col, label) {
                        return '<th class="pve-sortable" onclick="PVE.sortGuests(\'' + host.host_id + '\',\'' + col + '\')">' + label + hdrArrow(col) + '</th>';
                    };
                    var vmRows = allGuests.map(function(v) {
                        var cpu  = v.cpu    ? (v.cpu * 100).toFixed(1) + '%' : '—';
                        var ram  = v.maxmem ? pveBytes(v.mem || 0) + ' / ' + pveBytes(v.maxmem) : '—';
                        var up   = v.uptime ? pveUptime(v.uptime) : '—';
                        var pillCls  = 'pve-pill pve-pill-' + (v.status || 'stopped');
                        var hid = host.host_id, nd = esc(v.node), vid = v.vmid, vt = v.type;
                        var running  = v.status === 'running';
                        var menuId   = 'pve-menu-' + hid + '-' + vid;
                        var typeLabel = v.type === 'qemu' ? 'VM' : 'LXC';
                        var btns = '<div style="position:relative;display:inline-block">' +
                            '<button class="pve-btn pve-btn-sm pve-power-btn" title="Power actions" onclick="PVE.toggleActionMenu(event,\'' + menuId + '\')">' +
                                '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 3v9"/><path d="M18.4 5.6a9 9 0 1 1-12.8 0"/></svg>' +
                            '</button>' +
                            '<div class="pve-action-menu" id="' + menuId + '">' +
                                '<button class="pve-action-item pve-ai-start"' + (running ? ' disabled' : '') + ' onclick="PVE.doAction(event,\'' + menuId + '\',' + hid + ',\'' + nd + '\',' + vid + ',\'' + vt + '\',\'start\')">' +
                                    '<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>Start' +
                                '</button>' +
                                '<button class="pve-action-item pve-ai-shutdown"' + (!running ? ' disabled' : '') + ' onclick="PVE.doAction(event,\'' + menuId + '\',' + hid + ',\'' + nd + '\',' + vid + ',\'' + vt + '\',\'shutdown\')">' +
                                    '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>Shutdown' +
                                '</button>' +
                                '<button class="pve-action-item pve-ai-reboot"' + (!running ? ' disabled' : '') + ' onclick="PVE.doAction(event,\'' + menuId + '\',' + hid + ',\'' + nd + '\',' + vid + ',\'' + vt + '\',\'reboot\')">' +
                                    '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 1 0 .49-3.38"/></svg>Reboot' +
                                '</button>' +
                                '<div class="pve-action-sep"></div>' +
                                '<button class="pve-action-item pve-ai-stop"' + (!running ? ' disabled' : '') + ' onclick="PVE.doAction(event,\'' + menuId + '\',' + hid + ',\'' + nd + '\',' + vid + ',\'' + vt + '\',\'stop\')">' +
                                    '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>Force Stop' +
                                '</button>' +

                        var ipList = (v.ips && v.ips.length)

                            '<td class="pve-mono" style="color:var(--text-muted);font-size:0.78rem">' + vid + '</td>' +

                    return cardHead +
                        '<div class="pve-tbl-wrap"><table class="pve-tbl"><thead><tr>' + thClick('status','Status') + thClick('name','Name') + '<th>IP</th>' + thClick('type','Type') + thClick('id','ID') + thClick('node','Node') + thClick('cpu','CPU') + thClick('ram','RAM') + thClick('uptime','Uptime') + '<th></th></tr></thead>' +

                if (subPage === 'backups') {

                    var nbu     = host.not_backed_up || [];

                    var offlineStorages = host.offline_backup_storages || [];

                            '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" style="flex-shrink:0"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>' +

                    var renderBkpRow = function(b, extra) {

                            '<td class="pve-mono" style="color:var(--text-muted)">' + (b.vmid || '—') + '</td>' +
                            '<td><span class="pve-type-tag">' + typeLabel + '</span></td>' +
                            '<td style="color:var(--text-muted);font-size:0.78rem;white-space:nowrap">' + dateStr + '</td>' +
                            '<td style="color:var(--text-dim);white-space:nowrap">' + age + '</td>' +
                            '<td style="font-variant-numeric:tabular-nums;white-space:nowrap">' + pveBytes(b.size || 0) + '</td>' +
                            '<td class="pve-mono" style="color:var(--text-muted)">' + esc(b.storage_name || b.storage || '?') + '</td>' +
                            '<td class="pve-mono" style="color:var(--text-dim)">' + esc(b.format || '?') + '</td>' +
                            '<td style="text-align:center">' + prot + '</td>' +
                            '<td style="white-space:nowrap;font-size:0.75rem;font-weight:600;color:' + (b.task_status === 'FAILED' ? 'var(--danger,#f87171)' : 'var(--ok-color,#4ade80)') + '">' + (b.task_status || 'OK') + '</td>';

                            ? '<button onclick="pveToggleBkp(\'' + gid + '\',this)" style="margin-left:4px;background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:1px 6px;font-size:0.65rem;font-weight:600;color:var(--text-muted);cursor:pointer;font-family:inherit" title="' + group.length + ' total backups">+' + older.length + ' more</button>'
                            : '';

                    var bkpArrow = function(col) {

                    '</tr></thead><tbody>' + bkpRows + '</tbody></table></div>';

                            return '<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid rgba(244,63,94,0.15)">' +

                                '<span style="font-weight:600">' + name + '</span>' +

                            '<div style="font-size:0.72rem;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--danger);margin-bottom:8px">' +
                                '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="vertical-align:middle;margin-right:4px"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>' +
                                'Not in Backup Schedule (' + nbu.length + ')' +

            },

            sortGuests: function(hostId, col) {

                var labels = { start:'Starting', shutdown:'Stopping', reboot:'Restarting' };

                try {
                    var res  = await fetch(API_BASE + '/api/proxmox/hosts/' + hostId + '/action', {

        var _rrdStore = {}, _rrdFmt = {}, _rrdOverlay = {};

        function chartHover(event, gid) {
            var pts = _rrdStore[gid];
            if (!pts || pts.length < 2) return;
            var fmt      = _rrdFmt[gid] || function(v) { return v.toFixed(1) + '%'; };
            var rect     = event.currentTarget.getBoundingClientRect();
            var idx      = Math.min(pts.length - 1, Math.max(0, Math.round((event.clientX - rect.left) / rect.width * (pts.length - 1))));
            var interval = TF_INTERVAL[PVE._timeframe] || 1;
            var mins     = (pts.length - 1 - idx) * interval;
            var timeLabel;
            if (mins < 1)    timeLabel = 'now';
            else if (mins < 60)   timeLabel = Math.round(mins) + 'm ago';
            else if (mins < 1440) timeLabel = Math.round(mins / 60) + 'h ago';
            else              timeLabel = Math.round(mins / 1440) + 'd ago';
            var tip = document.getElementById('pve-chart-tip');
            var ov = _rrdOverlay[gid];
            var ovHtml = '';
            if (ov && ov.pts && ov.pts.length > 1) {
                var ovIdx = Math.min(ov.pts.length - 1, Math.max(0, Math.round((event.clientX - rect.left) / rect.width * (ov.pts.length - 1))));
                ovHtml = '<br><span style="color:' + ov.color + '">' + ov.label + ' </span><b>' + fmt(ov.pts[ovIdx]) + '</b>';
            }
            tip.innerHTML = '<span style="color:var(--text-muted);font-size:0.62rem">' + timeLabel + '</span><br><b>' + fmt(pts[idx]) + '</b>' + ovHtml;
            tip.style.left = (event.clientX + 14) + 'px';
            tip.style.top  = (event.clientY - 44) + 'px';
            tip.style.display = 'block';
        }
        function chartLeave() { document.getElementById('pve-chart-tip').style.display = 'none'; }

        function pveBytesShort(v) {
            if (!v || v < 1) return '0';
            if (v < 1024)       return Math.round(v) + 'B';
            if (v < 1048576)    return (v / 1024).toFixed(1) + 'K';
            if (v < 1073741824) return (v / 1048576).toFixed(1) + 'M';
            return (v / 1073741824).toFixed(1) + 'G';
        }

        function renderSparkline(pts, color, gradId, fmtFn, opts) {
            opts = opts || {};
            _rrdStore[gradId] = pts;
            _rrdFmt[gradId]   = typeof fmtFn === 'function' ? fmtFn : function(v) { return v.toFixed(1) + '%'; };
            if (pts.length < 2) return '<div style="padding-left:34px"><div style="height:70px;background:var(--bg2);border-radius:6px;"></div></div>';
            var W = 500, H = 70, px = 1, py = 4;
            var dMin = Math.min.apply(null, pts);
            var dMax = Math.max.apply(null, pts);
            var yMax, yLabTop, yLabMid, yLabBot;
            if (opts.isPct) {
                // dynamic but capped at 100 — line fills chart even at low utilisation
                yMax = Math.min(Math.max(dMax * 1.3, 8), 100);
                yLabTop = Math.round(yMax) + '%';
                yLabMid = Math.round(yMax / 2) + '%';
                yLabBot = '0%';
            } else {
                yMax = Math.max(dMax * 1.1, 1);
                yLabTop = pveBytesShort(yMax);
                yLabMid = pveBytesShort(yMax / 2);
                yLabBot = '0';
            }
            var step = (W - px * 2) / (pts.length - 1);
            var toY  = function(v) { return (H - py) - (v / yMax * (H - py * 2)); };
            var midY = toY(yMax / 2).toFixed(1);
            var coords = pts.map(function(v, i) { return (px + i * step).toFixed(1) + ',' + toY(v).toFixed(1); });
            var lx   = (px + (pts.length - 1) * step).toFixed(1);
            var area = 'M' + px + ',' + H + ' L' + coords.join(' L') + ' L' + lx + ',' + H + ' Z';

            var TF_START = { hour: '1h ago', day: '1d ago', week: '1w ago', month: '1m ago' };
            var startLbl = TF_START[(window.PVE && PVE._timeframe) || 'hour'] || '1h ago';

            var ls = 'font-size:0.58rem;font-family:\'Courier Prime\',monospace;color:var(--text-muted);line-height:1;white-space:nowrap';
            var yAxisHtml =
                '<div style="position:absolute;left:0;top:0;width:32px;height:70px;display:flex;flex-direction:column;justify-content:space-between;align-items:flex-end;padding:3px 4px 3px 0;box-sizing:border-box">' +
                    '<span style="' + ls + '">' + yLabTop + '</span>' +
                    '<span style="' + ls + '">' + yLabMid + '</span>' +
                    '<span style="' + ls + '">' + yLabBot + '</span>' +
                '</div>';

            var ovHtml = '';
            if (opts.overlay && opts.overlay.pts && opts.overlay.pts.length > 1) {
                var ovPts   = opts.overlay.pts;
                var ovColor = opts.overlay.color || '#f59e0b';
                _rrdOverlay[gradId] = { pts: ovPts, color: ovColor, label: opts.overlay.label || 'io wait' };
                var ovStep  = (W - px * 2) / (ovPts.length - 1);
                var ovCoords = ovPts.map(function(v, i) { return (px + i * ovStep).toFixed(1) + ',' + toY(v).toFixed(1); });
                var ovLx    = (px + (ovPts.length - 1) * ovStep).toFixed(1);
                var ovArea  = 'M' + px + ',' + H + ' L' + ovCoords.join(' L') + ' L' + ovLx + ',' + H + ' Z';
                ovHtml =
                    '<defs><linearGradient id="' + gradId + '_ov" x1="0" y1="0" x2="0" y2="1">' +
                    '<stop offset="0%" stop-color="' + ovColor + '" stop-opacity="0.35"/>' +
                    '<stop offset="100%" stop-color="' + ovColor + '" stop-opacity="0.02"/>' +
                    '</linearGradient></defs>' +
                    '<path d="' + ovArea + '" fill="url(#' + gradId + '_ov)"/>' +
                    '<polyline points="' + ovCoords.join(' ') + '" stroke="' + ovColor + '" stroke-width="1.6" fill="none" stroke-linejoin="round" stroke-linecap="round" vector-effect="non-scaling-stroke"/>';
            }
            var svgHtml = '<svg style="display:block;width:100%;border-radius:6px;cursor:crosshair" height="70" viewBox="0 0 ' + W + ' ' + H + '" preserveAspectRatio="none"' +
                ' onmousemove="chartHover(event,\'' + gradId + '\')" onmouseleave="chartLeave()">' +
                '<defs><linearGradient id="' + gradId + '" x1="0" y1="0" x2="0" y2="1">' +
                '<stop offset="0%" stop-color="' + color + '" stop-opacity="0.5"/>' +
                '<stop offset="100%" stop-color="' + color + '" stop-opacity="0.04"/>' +
                '</linearGradient></defs>' +
                '<rect width="' + W + '" height="' + H + '" fill="var(--bg2)"/>' +
                '<line x1="0" y1="' + midY + '" x2="' + W + '" y2="' + midY + '" stroke="rgba(128,128,128,0.12)" stroke-width="1" vector-effect="non-scaling-stroke"/>' +
                ovHtml +
                '<path d="' + area + '" fill="url(#' + gradId + ')"/>' +
                '<polyline points="' + coords.join(' ') + '" stroke="' + color + '" stroke-width="2.2" fill="none" stroke-linejoin="round" stroke-linecap="round" vector-effect="non-scaling-stroke"/>' +
                '</svg>';

            var timelineHtml =
                '<div style="display:flex;justify-content:space-between;margin-top:3px">' +
                    '<span style="' + ls + '">' + startLbl + '</span>' +
                    '<span style="' + ls + '">now</span>' +
                '</div>';

            return '<div style="position:relative;padding-left:34px">' +
                yAxisHtml +
                svgHtml +
                timelineHtml +
            '</div>';
        }

        function metricBox(label, valHtml, subHtml, pts, color, gradId, fmtFn, ftHtml, opts) {
            var minMaxHtml = '';
            if (pts && pts.length > 1 && typeof fmtFn === 'function') {
                var dMin = Math.min.apply(null, pts);
                var dMax = Math.max.apply(null, pts);
                minMaxHtml = '<div class="pve-metric-sub">' +
                    'Min <span style="color:var(--text)">' + fmtFn(dMin) + '</span>' +
                    '<span style="margin:0 5px;opacity:0.35">·</span>' +
                    'Max <span style="color:var(--text)">' + fmtFn(dMax) + '</span>' +
                '</div>';
            }
            return '<div class="pve-metric-box">' +
                '<div class="pve-metric-hd">' +
                    '<span class="pve-metric-label">' + label + '</span>' +
                    '<div style="text-align:right">' +
                        '<div class="pve-metric-val" style="color:' + color + '">' + valHtml + '</div>' +
                        (subHtml ? '<div class="pve-metric-sub">' + subHtml + '</div>' : '') +
                        minMaxHtml +
                    '</div>' +
                '</div>' +
                renderSparkline(pts, color, gradId, fmtFn, opts) +
                (ftHtml ? '<div class="pve-metric-ft">' + ftHtml + '</div>' : '') +
            '</div>';
        }

        function pveBytes(bytes) {
            if (!bytes) return '0 B';
            var units = ['B','KB','MB','GB','TB'];
            var i = Math.floor(Math.log(bytes) / Math.log(1024));
            return (bytes / Math.pow(1024, i)).toFixed(1) + ' ' + units[i];
        }

        function pveUptime(s) {
            var d = Math.floor(s / 86400), h = Math.floor((s % 86400) / 3600), m = Math.floor((s % 3600) / 60);
            if (d > 0) return d + 'd ' + h + 'h ' + m + 'm';
            if (h > 0) return h + 'h ' + m + 'm';
            return m + 'm';
        }

        function pveToggleBkp(gid, btn) {
            var rows = document.querySelectorAll('[data-bkpgroup="' + gid + '"]');
            var open = rows.length && rows[0].style.display !== 'none';
            rows.forEach(function(r) { r.style.display = open ? 'none' : ''; });
            btn.textContent = open ? '+' + rows.length : '−' + rows.length;
            btn.style.color = open ? '' : 'var(--accent)';
        }

        function pveAge(ctime) {
            var secs = Math.floor(Date.now() / 1000) - ctime;
            if (secs < 60)    return 'just now';
            if (secs < 3600)  return Math.floor(secs / 60) + ' mins ago';
            if (secs < 86400) return Math.floor(secs / 3600) + ' hours ago';
            return Math.floor(secs / 86400) + ' days ago';
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') document.querySelectorAll('.pve-action-menu.open').forEach(function(m) { m.classList.remove('open'); });
        });
        document.addEventListener('click', function() {
            document.querySelectorAll('.pve-action-menu.open').forEach(function(m) { m.classList.remove('open'); });
        });
        window.addEventListener('scroll', function() {
            document.getElementById('backToTop').classList.toggle('visible', window.scrollY > 300);
        });

        (function() {
            var subPage = window.location.pathname.split('/').pop() || 'overview';
            var tab = document.getElementById('subtab-' + subPage);
            if (tab) tab.classList.add('active');
            var titles = { overview: 'Overview', vmscontainers: 'VMs & Containers', storage: 'Storage', backups: 'Backups' };
            if (titles[subPage]) document.title = 'HomeLab Sonar — Proxmox / ' + titles[subPage];
            if (subPage === 'overview') {
                var tfBtns = document.getElementById('pve-tf-btns');
                if (tfBtns) tfBtns.style.display = 'flex';
                var activeBtn = document.getElementById('tf-' + PVE._timeframe);
                if (activeBtn) activeBtn.classList.add('active');
            }
        })();

        PVE.init();
        fetch(API_BASE + '/api/version').then(function(r){return r.json();}).then(function(d){
            var el=document.getElementById('appVersion');
            if(el&&d.version) el.textContent='v'+d.version;
        }).catch(function(){});
    </script>
</body>
</html>
